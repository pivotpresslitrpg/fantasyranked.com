name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily at 9am UTC (new releases)
    - cron: '0 9 * * *'
    # Sunday at 8am UTC (weekly rankings rebuild)
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BLOG_FEED_API_KEY: ${{ secrets.BLOG_FEED_API_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=fantasyranked
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"fantasyranked.com","key":"fr4a9c1d6e3b8f2h","urlList":["https://fantasyranked.com/","https://fantasyranked.com/rankings/","https://fantasyranked.com/new-releases/","https://fantasyranked.com/blog/","https://fantasyranked.com/sitemap-index.xml"]}' || true
